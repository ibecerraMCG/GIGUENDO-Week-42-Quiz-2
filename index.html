<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 42 Practice Quiz 2</title>

    <style>
        /* --- CSS Variables & Themes --- */
        :root {
            --transition-speed: 0.3s;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Default Feedback Colors (Fallback for custom themes) */
            --feedback-success-bg: #064e3b;
            --feedback-success-border: #059669;
            --feedback-success-text: #a7f3d0;
            --feedback-error-bg: #7f1d1d;
            --feedback-error-border: #dc2626;
            --feedback-error-text: #fecaca;
        }[data-theme="dark"] {
            --bg-body: #1e293b; --bg-card: #334155; --bg-header: #0f172a;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --text-accent: #38bdf8;
            --border-color: #475569; --highlight-bg: #475569;
            --button-bg: #38bdf8; --button-text: #0f172a; --button-hover: #0ea5e9;
        }[data-theme="light"] {
            --bg-body: #f3f4f6; --bg-card: #ffffff; --bg-header: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --text-accent: #2563eb;
            --border-color: #e5e7eb; --highlight-bg: #f3f4f6;
            --button-bg: #2563eb; --button-text: #ffffff; --button-hover: #1d4ed8;
            --feedback-success-bg: #ecfdf5; --feedback-success-border: #34d399; --feedback-success-text: #065f46;
            --feedback-error-bg: #fef2f2; --feedback-error-border: #f87171; --feedback-error-text: #991b1b;
        }[data-theme="midnight"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #e0e0e0; --text-muted: #888888; --text-accent: #90caf9;
            --border-color: #333333; --highlight-bg: #1a1a1a;
            --button-bg: #90caf9; --button-text: #000000; --button-hover: #42a5f5;
            --feedback-success-bg: #051b11; --feedback-success-border: #0f5132; --feedback-success-text: #75b798;
            --feedback-error-bg: #2c0b0e; --feedback-error-border: #842029; --feedback-error-text: #ea868f;
        }[data-theme="legacy-dark"] {
            --bg-body: #2d343e; --bg-card: #3c424f; --bg-header: #3c424f;
            --text-main: #e8e6e3; --text-muted: #b0c4de; --text-accent: #8ab4f8;
            --border-color: #555; --highlight-bg: #454c5a;
            --button-bg: #8ab4f8; --button-text: #202124; --button-hover: #a3c5f9;
            --feedback-success-bg: #344e41; --feedback-success-border: #52b788; --feedback-success-text: #c7f9cc;
            --feedback-error-bg: #5e2129; --feedback-error-border: #a4133c; --feedback-error-text: #f8d7da;
        }[data-theme="sepia"] {
            --bg-body: #f4ecd8; --bg-card: #fdf6e3; --bg-header: #e4d5b7;
            --text-main: #433422; --text-muted: #7c6f5a; --text-accent: #a05a2c;
            --border-color: #d3c4a5; --highlight-bg: #ebe1c9;
            --button-bg: #a05a2c; --button-text: #fdf6e3; --button-hover: #864822;
            --feedback-success-bg: #e6f4ea; --feedback-success-border: #8ab893; --feedback-success-text: #2e4c35;
            --feedback-error-bg: #f9e3e3; --feedback-error-border: #d48f8f; --feedback-error-text: #5c2b2b;
        }[data-theme="contrast"] {
            --bg-body: #000000; --bg-card: #000000; --bg-header: #000000;
            --text-main: #ffffff; --text-muted: #dddddd; --text-accent: #ffff00;
            --border-color: #ffffff; --highlight-bg: #333333;
            --button-bg: #ffff00; --button-text: #000000; --button-hover: #e6e600;
            --feedback-success-bg: #000000; --feedback-success-border: #00ff00; --feedback-success-text: #00ff00;
            --feedback-error-bg: #000000; --feedback-error-border: #ff0000; --feedback-error-text: #ff0000;
        }

        /* --- Global Reset & Layout --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        header.unpinned { position: relative; box-shadow: none; }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; flex-wrap: wrap; gap: 15px;
        }

        header h1 { font-size: 1.5rem; margin: 0; color: var(--text-accent); font-weight: 700; }

        .controls-wrapper { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* --- Custom Theme Builder --- */
        .custom-builder {
            display: none; flex-wrap: wrap; gap: 15px;
            background-color: var(--bg-card); padding: 10px 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-top: 5px; font-size: 0.85rem; animation: fadeIn 0.3s;
            width: 100%; justify-content: flex-end;
        }
        .custom-builder.active { display: flex; }
        .color-picker-group { display: flex; align-items: center; gap: 8px; }
        .color-picker-group input[type="color"] {
            border: none; width: 25px; height: 25px; border-radius: 4px;
            cursor: pointer; padding: 0; background: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Controls --- */
        .header-btn {
            background-color: var(--highlight-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-btn:hover {
            border-color: var(--text-accent);
            color: var(--text-accent);
        }

        .pin-btn {
            background: none; border: 1px solid var(--border-color); color: var(--text-main);
            cursor: pointer; padding: 0 10px; border-radius: 6px; font-size: 1rem;
            transition: background-color 0.2s; height: 34px; display: flex;
            align-items: center; justify-content: center;
        }
        .pin-btn:hover { background-color: var(--highlight-bg); }
        .pin-btn.pin-active { background-color: rgba(0, 0, 0, 0.1); }

        select#theme-select {
            padding: 0 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-card); color: var(--text-main);
            cursor: pointer; font-family: inherit; height: 34px;
        }

        /* --- Section Navigation --- */
        .section-nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .section-nav button {
            background-color: var(--highlight-bg); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
            font-weight: 500; transition: all 0.2s;
        }
        .section-nav button:hover { border-color: var(--text-accent); color: var(--text-accent); }

        /* --- Main Content --- */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .section-header {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.5rem;
            font-weight: 700;
            scroll-margin-top: 150px; /* Offset for sticky header */
        }

        /* --- Question Card --- */
        .question-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .lo-box {
            background-color: var(--highlight-bg);
            border-left: 4px solid var(--text-accent);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            display: none; /* Hidden by default */
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: var(--highlight-bg);
            border-color: var(--text-muted);
        }

        .option-label input {
            margin-top: 0.3rem;
            margin-right: 1rem;
            accent-color: var(--text-accent);
            transform: scale(1.2);
        }

        /* --- Buttons --- */
        .btn-check {
            margin-top: 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-check:hover {
            opacity: 0.9;
        }

        .btn-link {
            display: inline-block;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-link:hover {
            opacity: 0.9;
        }

        /* --- Feedback Area --- */
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
            border: 1px solid transparent;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background-color: var(--feedback-success-bg);
            border-color: var(--feedback-success-border);
            color: var(--feedback-success-text);
        }

        .feedback.incorrect {
            background-color: var(--feedback-error-bg);
            border-color: var(--feedback-error-border);
            color: var(--feedback-error-text);
        }

        .feedback-header {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .rationale {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .source {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px dashed currentColor;
            padding-top: 0.5rem;
        }

        /* --- Mobile Tweaks --- */
        @media (max-width: 768px) {
            .header-top { flex-direction: column; align-items: flex-start; }
            .controls-wrapper { width: 100%; justify-content: flex-start; }
            .section-nav { justify-content: flex-start; }
            .custom-builder { justify-content: flex-start; }
            header h1 { font-size: 1.25rem; }
            #reveal-all-container { justify-content: flex-start !important; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1>Week 42 Practice Quiz 2</h1>
            <div class="controls-wrapper">
                
                <!-- Reveal LOs Button -->
                <button id="reveal-all-btn" class="header-btn" onclick="toggleAllLOs()">Show Learning Objectives</button>
                
                <!-- Pin Button -->
                <button class="pin-btn pin-active" id="pin-btn" onclick="toggleHeader()" title="Pin/Unpin Header">📌</button>
                
                <!-- Theme Selector -->
                <div class="theme-control">
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="dark">Modern Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="light">Modern Light</option>
                        <option value="legacy-dark">Legacy Dark</option>
                        <option value="sepia">Sepia</option>
                        <option value="contrast">High Contrast</option>
                        <option value="custom">⚙️ Custom...</option>
                    </select>
                </div>
            </div>
            
            <!-- Custom Theme Color Pickers -->
            <div class="custom-builder" id="custom-builder">
                <div class="color-picker-group">
                    <label>Background:</label>
                    <input type="color" id="color-bg" value="#1a1a2e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Cards:</label>
                    <input type="color" id="color-card" value="#16213e" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Text:</label>
                    <input type="color" id="color-text" value="#e94560" oninput="updateCustomTheme()">
                </div>
                <div class="color-picker-group">
                    <label>Accent:</label>
                    <input type="color" id="color-accent" value="#0f3460" oninput="updateCustomTheme()">
                </div>
            </div>
        </div>
        
        <!-- Dynamic Navigation Bar -->
        <div class="section-nav" id="section-nav"></div>
    </header>

    <div class="container">
        <div id="quiz-root">
            <!-- Content injected via JS -->
        </div>
    </div>

    <script>
        // --- Data ---
        const quizData =[
            // --- Section 1: Pelvis ---
            {
                section: "Pelvis",
                fullLO: "LO1: Identify and describe the osteology of the pelvis, including bony landmarks, joints, and associated ligaments.",
                question: "A 34-year-old woman in her third trimester of pregnancy complains of a waddling gait and mild pelvic joint discomfort. Her obstetrician explains that her body is secreting a hormone that causes relaxation of her pelvic ligaments to facilitate delivery. Despite this hormonally induced expansion of pelvic diameters, which of the following pelvic measurements remains anatomically completely unaffected?",
                options: {
                    A: "Interspinous distance",
                    B: "Subpubic angle",
                    C: "Transverse diameter of the greater pelvis",
                    D: "Transverse diameter of the pelvic outlet",
                    E: "True (obstetrical) conjugate"
                },
                correctAnswer: "E",
                rationale: "During the latter part of pregnancy, the hormone relaxin causes pelvic joints and ligaments to relax, producing a 10-15% increase in pelvic diameters. However, the true (obstetrical) conjugate (the distance from the midpoint of the sacral promontory to the closest point of the pubic symphysis) is unaffected because it does not involve any relaxing joints.",
                source: "Pelvis PDF, Page 3: 'During the latter part of pregnancy, increased levels of sex hormones & the hormone relaxin cause the pelvic joints & ligaments to relax to facilitate delivery... However, the true (obstetrical) conjugate, the distance from the midpoint of the sacral promontory to the closest point of the pubic symphysis (10-12 cm), is unaffected (no joints involved).'"
            },
            {
                section: "Pelvis",
                fullLO: "LO1: Identify and describe the osteology of the pelvis, including bony landmarks, joints, and associated ligaments.",
                question: "A radiologist is reviewing a pelvic X-ray of a trauma patient. He notes intact ligamentous structures that convert the greater and lesser sciatic notches of the hip bone into distinct foramina. Which of the following ligaments specifically extends between the sacrum and the ischial spine to assist in creating these foramina?",
                options: {
                    A: "Anterior sacroiliac ligament",
                    B: "Inguinal ligament",
                    C: "Sacroiliac ligament",
                    D: "Sacrospinous ligament",
                    E: "Sacrotuberous ligament"
                },
                correctAnswer: "D",
                rationale: "The sacrospinous ligament extends between the sacrum and the ischial spine (deep to the sacrotuberous ligament). Together with the sacrotuberous ligament, it converts the sciatic notches into the greater and lesser sciatic foramina.",
                source: "Pelvis PDF, Page 3: 'Sacrospinous ligament – extends between sacrum & ischial spine, deep to the sacrotuberous ligament. Converts sciatic notches into greater & lesser sciatic foramina.'"
            },
            {
                section: "Pelvis",
                fullLO: "LO2: Differentiate the pelvic inlet and outlet, greater and lesser pelvis, and diameters (conjugates) of the pelvis and discuss their clinical significance.",
                question: "An obstetrician is evaluating a pregnant patient's pelvis to assess the feasibility of a vaginal delivery. She measures the distance between the patient's ischial spines, which represents the narrowest part of the pelvic canal. This specific anatomical measurement is known as the:",
                options: {
                    A: "Anatomical conjugate",
                    B: "Diagonal conjugate",
                    C: "Interspinous distance",
                    D: "Obstetrical conjugate",
                    E: "Transverse diameter of the inlet"
                },
                correctAnswer: "C",
                rationale: "The interspinous distance is the measurement between the ischial spines. It represents the narrowest part of the pelvic canal, though it is not a fixed distance.",
                source: "Pelvis PDF, Page 3: 'Interspinous distance – distance between the ischial spines; narrowest part of the pelvic canal (~9.5-11.5 cm), but it is not a fixed distance'"
            },
            {
                section: "Pelvis",
                fullLO: "LO2: Differentiate the pelvic inlet and outlet, greater and lesser pelvis, and diameters (conjugates) of the pelvis and discuss their clinical significance.",
                question: "A medical student is asked to identify the boundaries separating the greater pelvis from the lesser pelvis on a skeletal model. The superior pelvic aperture (pelvic inlet) serves as this division. Which of the following bony landmarks is a direct component of the pelvic brim that defines this inlet?",
                options: {
                    A: "Anterior superior iliac spine (ASIS)",
                    B: "Ischial tuberosity",
                    C: "Obturator foramen",
                    D: "Promontory of the sacrum",
                    E: "Tip of the coccyx"
                },
                correctAnswer: "D",
                rationale: "The pelvic inlet (superior pelvic aperture) divides the greater and lesser pelvis. It is bounded by the pelvic brim, which is formed by the pubic symphysis, pubic crest, pectineal line, arcuate line of the ilium, ala of the sacrum, and the sacral promontory.",
                source: "Pelvis PDF, Page 2: 'Pelvic Inlet (Superior pelvic aperture) Bounded by: pelvic brim formed by the pubic symphysis, pubic crest, pectineal line, arcuate line of the ilium (rounded ridge on medial surface), ala of the sacrum (upper lateral portion of sacrum), and sacral promontory'"
            },
            {
                section: "Pelvis",
                fullLO: "LO3: Describe the muscular and fascial components of the walls and floor of the lesser pelvis, including their attachments, innervation, and function. Describe possible consequences of trauma to the pelvic floor.",
                question: "A 35-year-old woman complains of fecal incontinence following a difficult, prolonged vaginal delivery. The obstetrician suspects a severe tearing injury to the muscular sling that passes posterior to the anorectal junction. Damage to which of the following muscles is most likely responsible for her loss of fecal continence?",
                options: {
                    A: "Coccygeus",
                    B: "Iliococcygeus",
                    C: "Obturator internus",
                    D: "Piriformis",
                    E: "Puborectalis"
                },
                correctAnswer: "E",
                rationale: "The puborectalis muscle (part of the levator ani) forms a U-shaped muscular sling around the anorectal junction. It maintains the anorectal flexure and plays a major role in maintaining fecal continence. Tearing of this muscle during childbirth can cause fecal incontinence.",
                source: "Pelvis PDF, Page 3: 'Clinical Note: Puborectalis muscles form a sling around the anorectal junction to maintain the anorectal flexure, thus playing a major role in fecal continence.' AND 'the pubococcygeus & puborectalis muscles, which encircle & support the urethra, vagina, & anal canal, may be torn during childbirth... presenting as urinary incontinence, fecal incontinence' (Pelvis PDF, Page 4)"
            },
            {
                section: "Pelvis",
                fullLO: "LO3: Describe the muscular and fascial components of the walls and floor of the lesser pelvis, including their attachments, innervation, and function. Describe possible consequences of trauma to the pelvic floor.",
                question: "A 45-year-old man undergoes pelvic imaging which reveals a tumor invading the lateral wall of his lesser pelvis. The tumor is situated within a muscle that originates within the lesser pelvis, exits through the lesser sciatic foramen, and inserts onto the greater trochanter of the femur. Which of the following muscles is affected?",
                options: {
                    A: "Coccygeus",
                    B: "Iliococcygeus",
                    C: "Obturator internus",
                    D: "Piriformis",
                    E: "Pubococcygeus"
                },
                correctAnswer: "C",
                rationale: "The obturator internus forms the lateral wall of the pelvic cavity. It originates within the lesser pelvis, exits through the lesser sciatic foramen, and turns sharply laterally to attach to the greater trochanter of the femur.",
                source: "Pelvis PDF, Page 3: 'Lateral wall: Obturator internus... Origin: Pelvic surface of ilium, ischium, & obturator membrane... Distal Attachment: Greater trochanter of femur *Exits pelvis via lesser sciatic foramen'"
            },
            {
                section: "Pelvis",
                fullLO: "LO4: Define the peritoneal reflections and pouches of the male and female pelvises and their clinical significance.",
                question: "A 28-year-old woman presents to the emergency department with severe lower abdominal pain and a positive pregnancy test. An ultrasound reveals a ruptured ectopic pregnancy with extensive hemoperitoneum. A needle is inserted through the posterior vaginal fornix to extract this accumulated blood (culdocentesis). The fluid is being drained directly from which of the following anatomical spaces?",
                options: {
                    A: "Ischioanal fossa",
                    B: "Rectouterine pouch (of Douglas)",
                    C: "Rectovesical pouch",
                    D: "Superficial perineal pouch",
                    E: "Uterovesical pouch"
                },
                correctAnswer: "B",
                rationale: "The rectouterine pouch is the lowest point of the female peritoneal cavity where fluid/blood accumulates. It is directly accessible via the posterior vaginal fornix for fluid extraction (culdocentesis).",
                source: "Pelvis PDF, Page 7: 'The posterior fornix is the deepest portion & directly related to the rectouterine pouch. This constitutes the area where there is a minimum of tissue intervening between the peritoneal cavity & the external environment. It is used as a site for culdocentesis (extraction of fluid from the rectouterine pouch through a needle)'"
            },
            {
                section: "Pelvis",
                fullLO: "LO4: Define the peritoneal reflections and pouches of the male and female pelvises and their clinical significance.",
                question: "A 60-year-old man with a perforated appendix develops a pelvic abscess. As purulent fluid tracks downward due to gravity, it accumulates in the inferiormost extent of his peritoneal cavity. In a male, this specific space is located immediately between which of the following structures?",
                options: {
                    A: "Bladder and pubic symphysis",
                    B: "Prostate and rectum",
                    C: "Rectum and bladder",
                    D: "Rectum and sacrum",
                    E: "Seminal vesicles and prostate"
                },
                correctAnswer: "C",
                rationale: "In males, the peritoneum reflects from the rectum to the bladder, creating the rectovesical pouch. This pouch is the lowest point of the male pelvic cavity where pus and fluid can collect.",
                source: "Pelvis PDF, Page 4: 'Rectovesical pouch – depression between the rectum & bladder in males... The rectovesical pouch (males) and rectouterine pouch (females) are the inferiormost extent of the peritoneal cavity. These are sites where fluid, blood, pus, etc. may collect.'"
            },
            {
                section: "Pelvis",
                fullLO: "LO5: Identify and describe the vasculature found within the pelvis, including regions/structures that the vessels supply/drain and their relationships to other structures.",
                question: "During a total abdominal hysterectomy on a 48-year-old woman, the surgeon meticulously isolates and ligates the uterine arteries. To avoid a catastrophic iatrogenic injury during this specific step, the surgeon must positively identify and exclude a tubular structure that passes immediately inferior to the uterine artery (\"water under the bridge\"). Which of the following structures must be protected?",
                options: {
                    A: "Fallopian tube",
                    B: "Internal pudendal artery",
                    C: "Round ligament of the uterus",
                    D: "Ureter",
                    E: "Vaginal artery"
                },
                correctAnswer: "D",
                rationale: "The uterine artery passes superior to the ureter near the lateral vaginal fornix. Because of this \"water under the bridge\" relationship, the ureter is in significant danger of being inadvertently clamped, ligated, or transected during a hysterectomy.",
                source: "Pelvis PDF, Page 7: 'Uterine arteries (from internal iliac a.) – runs medially toward the cervix; pass superior to the ureters near the lateral fornix of the vagina. Clinical Note: This is an important relationship (“water under the bridge”) for surgeons ligating the uterine artery, as in a hysterectomy. The ureters must be positively identified & excluded from ligature.'"
            },

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                for (const[key, value] of Object.entries(item.options)) {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${index}`;
                    input.value = key;

                    const span = document.createElement('span');
                    span.innerHTML = `${key}. ${value}`;

                    label.appendChild(input);
                    label.appendChild(span);
                    optionsGrid.appendChild(label);
                }
                card.appendChild(optionsGrid);

                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.textContent = 'Check Answer';
                btn.onclick = () => checkAnswer(index);
                card.appendChild(btn);

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `feedback-${index}`;
                card.appendChild(feedback);

                quizRoot.appendChild(card);
            });

            const returnContainer = document.createElement('div');
            returnContainer.style.textAlign = 'center';
            returnContainer.style.marginTop = '2rem';
            
            const returnBtn = document.createElement('a');
            returnBtn.href = 'https://ibecerramcg.github.io/GI-GU-ENDO-Practice-Quizzes/';
            returnBtn.className = 'btn-link';
            returnBtn.textContent = '← Return to Quiz Directory';
            
            returnContainer.appendChild(returnBtn);
            quizRoot.appendChild(returnContainer);

            const savedTheme = localStorage.getItem('quizTheme') || 'dark';
            themeSelect.value = savedTheme;
            changeTheme(savedTheme);

            const savedPinState = localStorage.getItem('headerPinned');
            toggleHeader(savedPinState !== 'false');
        }

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const data = quizData[index];

            if (!selected) {
                alert("Please select an answer.");
                return;
            }

            const isCorrect = selected.value === data.correctAnswer;
            
            let html = `<span class="feedback-header">${isCorrect ? "Correct!" : "Incorrect"}</span>`;
            if (!isCorrect) {
                html += `<div>The correct answer is <strong>${data.correctAnswer}</strong>.</div>`;
            }
            
            html += `<div class="rationale"><strong>Rationale:</strong> ${data.rationale}</div>`;
            html += `<div class="source"><strong>Source:</strong> ${data.source}</div>`;

            feedbackEl.innerHTML = html;
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';
        }

        function changeTheme(themeName) {
            localStorage.setItem('quizTheme', themeName);
            
            if (themeName === 'custom') {
                rootElements.removeAttribute('data-theme');
                customBuilder.classList.add('active');
                loadCustomTheme();
            } else {
                rootElements.setAttribute('data-theme', themeName);
                customBuilder.classList.remove('active');
                rootElements.removeAttribute('style');
            }
        }

        function updateCustomTheme() {
            const bg = document.getElementById('color-bg').value;
            const card = document.getElementById('color-card').value;
            const text = document.getElementById('color-text').value;
            const accent = document.getElementById('color-accent').value;

            rootElements.style.setProperty('--bg-body', bg);
            rootElements.style.setProperty('--bg-header', bg);
            rootElements.style.setProperty('--bg-card', card);
            rootElements.style.setProperty('--highlight-bg', card);
            rootElements.style.setProperty('--text-main', text);
            rootElements.style.setProperty('--text-accent', accent);
            rootElements.style.setProperty('--button-bg', accent);
            rootElements.style.setProperty('--button-text', bg);
            rootElements.style.setProperty('--border-color', accent + '40');

            const customColors = { bg, card, text, accent };
            localStorage.setItem('customThemeColors', JSON.stringify(customColors));
        }

        function loadCustomTheme() {
            const savedColors = JSON.parse(localStorage.getItem('customThemeColors'));
            if (savedColors) {
                document.getElementById('color-bg').value = savedColors.bg;
                document.getElementById('color-card').value = savedColors.card;
                document.getElementById('color-text').value = savedColors.text;
                document.getElementById('color-accent').value = savedColors.accent;
                updateCustomTheme();
            } else {
                updateCustomTheme();
            }
        }

        function toggleHeader(forceState) {
            const isCurrentlyPinned = !mainHeader.classList.contains('unpinned');
            const newState = (typeof forceState === 'boolean') ? forceState : !isCurrentlyPinned;

            if (newState) {
                mainHeader.classList.remove('unpinned');
                pinBtn.classList.add('pin-active');
                localStorage.setItem('headerPinned', 'true');
            } else {
                mainHeader.classList.add('unpinned');
                pinBtn.classList.remove('pin-active');
                localStorage.setItem('headerPinned', 'false');
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);

    </script>
</body>
</html>
